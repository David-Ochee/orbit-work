name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STELLAR_NETWORK: mainnet
      # Replace with your hosting provider's deploy action
      # e.g. vercel, netlify, fly.io, etc.
      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t orbit-work-api:${{ github.sha }} .
      # Replace with your container registry / hosting push steps
      - name: Push image
        run: echo "Push to your registry here"
